version: '3'

services:

  web:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - 80:3000
    environment:
      - NODE_ENV=development
    depends_on:
      - db

  db:
    image: mysql:5.7
    volumes:
      - db-data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=secret
      - MYSQL_DATABASE=spacefractions

volumes:
  db-data: