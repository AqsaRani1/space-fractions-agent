version: '3'

services:

  frontend:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://api:3001
    depends_on:
      - api
      
  api:
    build:
      context: .
      dockerfile: Dockerfile.api  
    ports:
      - "3001:3001"
    environment:
      - DB_HOST=database
      - DB_PORT=5432
      - DB_USER=myuser
      - DB_PASS=secret
    depends_on:
      - database
      
  database:
    image: postgres:12
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=space_fractions