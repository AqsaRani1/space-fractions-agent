```yaml
openapi: 3.0.0
info:
  title: Space Fractions
  version: 1.0.0

servers:
  - url: http://api.example.com/v1

paths:
  /api/play:
    get:
      summary: Get game state
      responses:
        '200':
          description: Success
          content:
            application/json:    
              schema:
                $ref: '#/components/schemas/GameState'
              example:
                currentQuestion: 1
                correctAnswers: 5
                incorrectAnswers: 2
                score: 250
                
    post:
      summary: Submit answer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnswerRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnswerResponse'
              example:
                correct: true
                score: 50
                
  /api/score:
    get:
      summary: Get player score
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Score'
              example:
                score: 500
                
  /api/questions:
    get:
      summary: Get all questions
      responses:
        '200':
          description: Success
          content:
            application/json:    
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Question'
              example:
                - id: 1
                  question: What is 1/2 + 1/4?
                  answers:
                    - 3/4
                    - 5/8
                    - 7/12
                    - 1
                  correctAnswer: 0
                - id: 2
                  question: What is 2/3 - 1/6?
                  answers:
                    - 1/2
                    - 1/3
                    - 1/6
                    - 5/6
                  correctAnswer: 3
                  
  /api/questions/random:
    get:
      summary: Get a random question
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Question'
              example:
                id: 3
                question: What is 3/5 + 2/9?
                answers:
                  - 13/45
                  - 5/9
                  - 17/45
                  - 11/15
                correctAnswer: 2
                
  /api/questions/{id}/check:
    post:
      summary: Check answer for a question
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnswerCheckRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnswerCheckResponse'
              example:
                correct: true
                score: 50
                
  /api/auth/register:
    post:
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
              example:
                userId: 123
                token: abc123
                
  /api/auth/login:
    post:
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              example:
                userId: 123
                token: abc123
                
  /api/auth/verify:
    get:
      summary: Verify token
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyResponse'
              example:
                valid: true
                userId: 123
                
components:
  schemas:
    GameState:
      type: object
      properties:
        currentQuestion:
          type: integer
        correctAnswers:
          type: integer  
        incorrectAnswers:
          type: integer
        score:
          type: integer
          
    AnswerRequest:
      type: object
      properties:
        answer:
          type: integer
          
    AnswerResponse:
      type: object
      properties:
        correct:
          type: boolean
        score:
          type: integer
          
    Score:
      type: object
      properties:
        score:
          type: integer
          
    Question:
      type: object
      properties:
        id:
          type: integer
        question:
          type: string
        answers:
          type: array
          items:
            type: string
        correctAnswer:
          type: integer
          
    AnswerCheckRequest:
      type: object
      properties:
        answer:
          type: integer
          
    AnswerCheckResponse:
      type: object
      properties:
        correct:
          type: boolean
        score:
          type: integer
          
    RegisterRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
          
    RegisterResponse:
      type: object
      properties:
        userId:
          type: integer
        token:
          type: string
          
    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
          
    LoginResponse:
      type: object
      properties:
        userId:
          type: integer
        token:
          type: string
          
    VerifyResponse:
      type: object
      properties:
        valid:
          type: boolean
        userId:
          type: integer
```